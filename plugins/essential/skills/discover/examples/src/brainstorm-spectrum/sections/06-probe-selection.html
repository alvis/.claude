      <section
        id="probe-selection"
        class="discovery-section"
        data-discovery-section
        data-section-id="probe-selection"
        data-section-label="Probes to keep"
        data-presentation-pattern="assembly"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">Your probe portfolio</p>
          <h2>How should the selected ideas be tested?</h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="portfolio-shape"
            data-question-label="Preferred probe portfolio"
            data-spectrum-reaction
          >
            <legend>
              Choose the investigation strategy, not a final architecture.
            </legend>
            <div class="discovery-options">
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="portfolio-shape"
                  value="Front-load the cheapest discriminating probes"
                  data-recommended="true"
                  checked
                /><span class="discovery-option-copy"
                  ><strong>Front-load discriminating probes</strong
                  ><small
                    >Run the empty-state, sample, and failure-recovery checks
                    before funding larger surfaces.</small
                  ></span
                ><span class="discovery-badge">Recommended</span></label
              >
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="portfolio-shape"
                  value="Run one probe from every time horizon"
                /><span class="discovery-option-copy"
                  ><strong>One probe per horizon</strong
                  ><small
                    >Learn about immediate friction and structural fit in
                    parallel.</small
                  ></span
                ></label
              >
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="portfolio-shape"
                  value="Prioritize the structural product-shape hypothesis"
                /><span class="discovery-option-copy"
                  ><strong>Prioritize the structural hypothesis</strong
                  ><small
                    >Use research or a disposable prototype to test role-aware
                    setup before implementation.</small
                  ></span
                ></label
              >
            </div>
          </fieldset>
          <div
            class="discovery-field"
            data-discovery-question
            data-question-id="missing-idea"
            data-question-label="Missing solution-space idea"
          >
            <label for="missing-idea"
              >What possibility is missing from this spectrum?</label
            ><textarea
              id="missing-idea"
              placeholder="Add a materially different intervention or constraint."
            ></textarea>
          </div>
        </div>
      </section>
