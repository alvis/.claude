# Feedback for the LLM coder

## Goal
Implement the Conflux real-time sync backend to the decomposition and data-flow decisions pinned on this board, before adding anything not shown here.

## Architecture at a glance
Four layers, top to bottom:
- Clients — browser editors, each holding an optimistic local CRDT replica.
- Edge — a stateless Realtime Gateway over WebSocket; any node can serve any session.
- Domain services — Session Coordinator (routes ops to a document actor, owns membership), CRDT Merge Engine (Yjs-style convergence, no central merge lock), Presence Service (ephemeral cursors and selections).
- Persistence — Op Log (append-only event store, single source of truth), Snapshot Store (derived, rebuildable cache), Presence Bus (Redis pub/sub, no durability).

## Edit data-flow
An edit is received at the gateway, merged by the CRDT engine, appended to the op log, and then fanned out to presence subscribers. Perceived sync lag is dominated by merge time, not transport.

## Decisions to build to
- Gateway is stateless — hold no document state at the edge; scale horizontally behind a plain load balancer. (decided)
- CRDT merge over OT — accept extra per-edit metadata in exchange for a lock-free, convergent server. (approved)
- Op log is the source of truth — reconstruct any state by replaying the append-only log; treat snapshots as a derived cache only. (decided)

## Open questions — do not silently resolve
- Presence fan-out over a single Redis channel is unproven at peak concurrency; keep it behind a load test. (open)
- Per-document in-memory CRDT budget is assumed, not measured; flag if a hot document could exceed one instance's memory.

## Trade-offs to respect
- Wins: horizontal edge scale, replayable/auditable state, no central merge lock.
- Costs: CRDT metadata growth (memory and payload), snapshot-compaction lag window.
- Note: the latency-budget proportions and any throughput or concurrency numbers on the board are invented illustrative shapes, not measured data — do not treat them as real.

## Requested next action
Build to the confirmed decisions and every annotation above. Preserve the open questions as questions; do not choose a presence-scale or memory-budget default without a user decision. Report what you built and what still needs sign-off.
