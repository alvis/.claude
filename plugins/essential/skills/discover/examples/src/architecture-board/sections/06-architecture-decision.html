      <section
        id="architecture-decision"
        class="discovery-section"
        data-discovery-section
        data-section-id="architecture-decision"
        data-section-label="Your input"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">Your decision</p>
          <h2>How locked is this architecture before build?</h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="architecture-readiness"
            data-question-label="Architecture readiness for build"
          >
            <legend>
              Choose how much of this architecture the implementer should treat
              as fixed.
            </legend>
            <div class="discovery-options">
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="architecture-readiness"
                  value="Build to the approved decisions; leave open items flagged"
                  data-recommended="true"
                  checked
                />
                <span class="discovery-option-copy">
                  <strong>Build the approved parts</strong>
                  <small
                    >Implement everything marked decided or approved; leave the
                    presence fan-out as a load-test TODO.</small
                  >
                </span>
                <span class="discovery-badge">Recommended</span>
              </label>
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="architecture-readiness"
                  value="Resolve every open question before any code is written"
                />
                <span class="discovery-option-copy">
                  <strong>Resolve open items first</strong>
                  <small
                    >Block implementation until presence scale and in-memory op
                    budget are settled.</small
                  >
                </span>
              </label>
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="architecture-readiness"
                  value="Treat the whole diagram as an exploratory sketch"
                />
                <span class="discovery-option-copy">
                  <strong>Exploratory only</strong>
                  <small
                    >Nothing is binding yet; use the diagram to spark a
                    conversation, not a build.</small
                  >
                </span>
              </label>
            </div>
          </fieldset>

          <div
            class="discovery-field"
            data-discovery-question
            data-question-id="architecture-constraint"
            data-question-label="Constraint that changes the architecture"
          >
            <label for="architecture-constraint"
              >What constraint should change one of these decisions?</label
            >
            <textarea
              id="architecture-constraint"
              placeholder="For example: the CRDT memory footprint per document exceeds the per-instance budget at our largest tenants."
            ></textarea>
          </div>
        </div>
      </section>
