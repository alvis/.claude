      <section
        id="hub-decision"
        class="discovery-section"
        data-discovery-section
        data-section-id="hub-decision"
        data-section-label="Your input"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">Your decision</p>
          <h2>Which board should anchor the next step?</h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="anchor-board"
            data-question-label="Board to anchor the next step"
          >
            <legend>
              Which board should the coder treat as the primary reference?
            </legend>
            <div class="discovery-options">
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="anchor-board"
                  value="Anchor on the brand specimen board"
                  data-recommended="true"
                  checked
                />
                <span class="discovery-option-copy">
                  <strong>Brand specimen board</strong>
                  <small
                    >Build against the pinned specimen and its decided
                    items.</small
                  >
                </span>
                <span class="discovery-badge">Recommended</span>
              </label>
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="anchor-board"
                  value="Keep both boards in view; neither is primary yet"
                />
                <span class="discovery-option-copy">
                  <strong>Both, equally</strong>
                  <small
                    >Treat the session as still exploratory across boards.</small
                  >
                </span>
              </label>
            </div>
          </fieldset>
        </div>
      </section>
