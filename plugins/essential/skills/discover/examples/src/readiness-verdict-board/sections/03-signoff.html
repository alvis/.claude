      <section
        id="signoff"
        class="discovery-section"
        data-discovery-section
        data-section-id="signoff"
        data-section-label="Program verdict"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">03 · Sign-off</p>
          <h2>Call the program</h2>
          <p class="discovery-muted">
            One verdict for the whole board. It lands in the generated reply
            alongside every per-stream answer above.
          </p>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-verdict-signoff
            data-question-id="program-verdict"
            data-question-label="Program verdict"
          >
            <legend>Where does the program go from here?</legend>
            <div class="discovery-options">
              <label class="discovery-option">
                <input
                  type="radio"
                  name="program-verdict"
                  value="More discovery first"
                  data-recommended="true"
                  checked
                />
                <span class="discovery-option-copy"
                  ><strong>More discovery — resolve the four operator
                    decisions first</strong
                  ><small
                    >The critical path runs entirely through undecided
                    questions; building now bakes in guesses.</small
                  ></span
                >
                <span class="discovery-badge">Recommended</span>
              </label>
              <label class="discovery-option">
                <input
                  type="radio"
                  name="program-verdict"
                  value="Build the ready streams now"
                />
                <span class="discovery-option-copy"
                  ><strong>Build the ready streams now</strong
                  ><small
                    >The replay view can land this week — but it does not
                    shorten the path to the first fill.</small
                  ></span
                >
              </label>
              <label class="discovery-option">
                <input
                  type="radio"
                  name="program-verdict"
                  value="Pause the program"
                />
                <span class="discovery-option-copy"
                  ><strong>Pause the program</strong
                  ><small
                    >Stop all streams until the operator can commit time to
                    the four decisions.</small
                  ></span
                >
              </label>
            </div>
          </fieldset>
        </div>
      </section>
