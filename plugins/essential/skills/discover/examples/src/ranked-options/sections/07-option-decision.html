      <section
        id="option-decision"
        class="discovery-section"
        data-discovery-section
        data-section-id="option-decision"
        data-section-label="Your shortlist"
        data-presentation-pattern="choice-toggle"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">One final selection</p>
          <h2>Which mechanism should anchor Decide?</h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="final-direction"
            data-question-label="Final ranked direction"
            data-final-selection
          >
            <legend>
              Select one direction after reviewing all four frames.
            </legend>
            <div class="discovery-options">
              <label class="discovery-option discovery-choice-card"
                ><input
                  type="radio"
                  name="final-direction"
                  value="Producer adapter"
                  data-direction-choice="producer-adapter"
                  data-recommended="true"
                  checked
                /><span class="discovery-option-copy"
                  ><strong>Producer adapter</strong
                  ><small>Preserve as the reversible baseline.</small></span
                ><span class="discovery-badge">Recommended</span></label
              ><label class="discovery-option discovery-choice-card"
                ><input
                  type="radio"
                  name="final-direction"
                  value="Versioned topics"
                  data-direction-choice="versioned-topics"
                /><span class="discovery-option-copy"
                  ><strong>Versioned topics</strong
                  ><small>Keep when long overlap is material.</small></span
                ></label
              ><label class="discovery-option discovery-choice-card"
                ><input
                  type="radio"
                  name="final-direction"
                  value="Consumer translators"
                  data-direction-choice="consumer-translators"
                /><span class="discovery-option-copy"
                  ><strong>Consumer translators</strong
                  ><small
                    >Keep only when producer ownership is unavailable.</small
                  ></span
                ></label
              ><label class="discovery-option discovery-choice-card"
                ><input
                  type="radio"
                  name="final-direction"
                  value="Schema gateway"
                  data-direction-choice="schema-gateway"
                /><span class="discovery-option-copy"
                  ><strong>Schema gateway</strong
                  ><small
                    >Choose when contract negotiation deserves a platform
                    owner.</small
                  ></span
                ></label
              >
            </div>
          </fieldset>
          <div
            class="discovery-field"
            data-discovery-question
            data-question-id="dominant-tradeoff"
            data-question-label="Dominant comparison tradeoff"
          >
            <label for="dominant-tradeoff"
              >Which tradeoff should dominate the eventual decision?</label
            ><textarea
              id="dominant-tradeoff"
              placeholder="For example: support a twelve-month consumer migration window."
            ></textarea>
          </div>
        </div>
      </section>
