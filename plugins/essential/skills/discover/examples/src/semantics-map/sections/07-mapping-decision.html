      <section
        id="mapping-decision"
        class="discovery-section"
        data-discovery-section
        data-section-id="mapping-decision"
        data-section-label="Mapping decisions"
        data-presentation-pattern="data-model-card"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">Your mapping</p>
          <h2>Resolve the target differences before implementation.</h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question discovery-decision-box"
            data-discovery-question
            data-question-id="cursor-storage"
            data-question-label="Durable cursor owner"
          >
            <legend>Which boundary owns the epoch-fenced cursor?</legend>
            <div class="discovery-options">
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="cursor-storage"
                  value="Service-owned partition cursor record"
                  data-recommended="true"
                  checked
                /><span class="discovery-option-copy"
                  ><strong>Service-owned record</strong
                  ><small
                    >Preserves explicit replay, audit actor, and epoch
                    fencing.</small
                  ></span
                ><span class="discovery-badge">Recommended</span></label
              >
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="cursor-storage"
                  value="Broker-owned consumer offset"
                /><span class="discovery-option-copy"
                  ><strong>Broker offset</strong
                  ><small
                    >Less target code, but operator replay and lease epochs
                    follow broker semantics.</small
                  ></span
                ></label
              >
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="cursor-storage"
                  value="Caller-supplied cursor"
                /><span class="discovery-option-copy"
                  ><strong>Caller cursor</strong
                  ><small
                    >Moves durability and gap tracking outside this
                    service.</small
                  ></span
                ></label
              >
            </div>
          </fieldset>
          <fieldset
            class="discovery-question discovery-decision-box"
            data-discovery-question
            data-question-id="stale-lease-surface"
            data-question-label="Stale lease error surface"
          >
            <legend>
              How should a stale acknowledgment surface to the worker?
            </legend>
            <div class="discovery-options">
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="stale-lease-surface"
                  value="Typed LeaseExpiredError with epoch metadata"
                  data-recommended="true"
                  checked
                /><span class="discovery-option-copy"
                  ><strong>Typed error</strong
                  ><small
                    >Preserve recovery context and stop retrying under the stale
                    owner.</small
                  ></span
                ><span class="discovery-badge">Recommended</span></label
              >
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="stale-lease-surface"
                  value="Boolean false from commit"
                /><span class="discovery-option-copy"
                  ><strong>Boolean refusal</strong
                  ><small
                    >Closer to storage, but loses why the write was
                    rejected.</small
                  ></span
                ></label
              >
            </div>
          </fieldset>
          <div
            class="discovery-field"
            data-discovery-question
            data-question-id="semantic-exception"
            data-question-label="Required semantic exception"
          >
            <label for="semantic-exception"
              >Which observable behavior should intentionally differ?</label
            >
            <textarea
              id="semantic-exception"
              placeholder="Name the behavior, evidence for changing it, and the target outcome that replaces it."
            ></textarea>
          </div>
        </div>
      </section>
