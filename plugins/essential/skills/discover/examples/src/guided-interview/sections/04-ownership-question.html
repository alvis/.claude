      <section
        id="ownership-question"
        class="discovery-section"
        data-discovery-section
        data-section-id="ownership-question"
        data-section-label="Operational ownership"
        data-interview-step="4"
        data-presentation-pattern="avatars"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">04 · Operations</p>
          <h2>
            Who owns a job that is moving but producing the wrong outcome?
          </h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="operational-owner"
            data-question-label="Operational owner"
          >
            <legend>
              Queue health and invoice correctness are different incidents.
            </legend>
            <div class="discovery-options discovery-avatar-options">
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="operational-owner"
                  value="Billing owns job outcomes; platform owns queue availability"
                  data-recommended="true"
                  checked
                /><span class="discovery-avatar">PT</span
                ><span class="discovery-option-copy"
                  ><strong>Split by consequence</strong
                  ><small
                    >Billing owns stuck or incorrect invoices; platform owns
                    queue saturation and delivery availability.</small
                  ></span
                ><span class="discovery-badge">Recommended</span></label
              ><label class="discovery-option"
                ><input
                  type="radio"
                  name="operational-owner"
                  value="Billing team owns all alerts and replay"
                /><span class="discovery-avatar">PF</span
                ><span class="discovery-option-copy"
                  ><strong>Billing owns everything</strong
                  ><small
                    >One accountable owner, including queue-level
                    symptoms.</small
                  ></span
                ></label
              ><label class="discovery-option"
                ><input
                  type="radio"
                  name="operational-owner"
                  value="Platform team owns all background-work incidents"
                /><span class="discovery-avatar">SO</span
                ><span class="discovery-option-copy"
                  ><strong>Platform owns everything</strong
                  ><small
                    >Centralize operations, but detach invoice correctness from
                    its domain owner.</small
                  ></span
                ></label
              >
            </div>
          </fieldset>
        </div>
      </section>
