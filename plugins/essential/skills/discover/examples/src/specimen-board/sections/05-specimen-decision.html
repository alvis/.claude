      <section
        id="specimen-decision"
        class="discovery-section"
        data-discovery-section
        data-section-id="specimen-decision"
        data-section-label="Your input"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">Your decision</p>
          <h2>How locked is this specimen before build?</h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="specimen-readiness"
            data-question-label="Specimen readiness for build"
          >
            <legend>
              Choose how much of this specimen the implementer should treat as
              fixed.
            </legend>
            <div class="discovery-options">
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="specimen-readiness"
                  value="Build to the approved decisions; leave open items flagged"
                  data-recommended="true"
                  checked
                />
                <span class="discovery-option-copy">
                  <strong>Build the approved parts</strong>
                  <small
                    >Implement everything marked decided or approved; leave the
                    open status colour as a visible TODO.</small
                  >
                </span>
                <span class="discovery-badge">Recommended</span>
              </label>
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="specimen-readiness"
                  value="Resolve every open question before any code is written"
                />
                <span class="discovery-option-copy">
                  <strong>Resolve open items first</strong>
                  <small
                    >Block implementation until the held-status colour and item
                    density are settled.</small
                  >
                </span>
              </label>
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="specimen-readiness"
                  value="Treat the whole specimen as an exploratory sketch"
                />
                <span class="discovery-option-copy">
                  <strong>Exploratory only</strong>
                  <small
                    >Nothing is binding yet; use the specimen to spark a
                    conversation, not a build.</small
                  >
                </span>
              </label>
            </div>
          </fieldset>

          <div
            class="discovery-field"
            data-discovery-question
            data-question-id="specimen-constraint"
            data-question-label="Constraint that changes the specimen"
          >
            <label for="specimen-constraint"
              >What constraint should change one of these decisions?</label
            >
            <textarea
              id="specimen-constraint"
              placeholder="For example: the brand indigo fails contrast on the awaiting-fulfilment tile at small sizes."
            ></textarea>
          </div>
        </div>
      </section>
