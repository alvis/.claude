# Feedback for the LLM coder

## Goal
Decide whether extracting `NotificationFacade.send()` into its own service is ready for planning. "Ready" means a planner can preserve today's behavior without inventing ownership that no one has agreed to. Do not begin the extraction until the blocking gate below is resolved.

## Readiness gates (each must be independently inspectable)
- G1 · behavior — Caller contract: every current caller of `send()` and its expected result is mapped from the inbound call graph. (pass)
- G2 · data — Persistence boundary: what state the facade reads and writes, and which store owns it, is identified. (pass)
- G3 · operability — Failure and recovery: the at-least-once delivery guarantee and the manual replay path are documented, including the SMS callback path (sampled only). (pass)
- G4 · ownership — Preference enforcement: WHO decides whether a notification is allowed is unresolved. This is the gate that blocks planning.
- Migration and rollback: the extraction can be staged and reverted, but only once ownership is fixed.

## Blocking decision — who owns the allow decision
"Who decides whether a notification is allowed?" must be answered before planning:
- Application-owned — callers keep enforcing preferences; the service only sends.
- Service-owned — the new service owns preference enforcement end to end.
- Split ownership — enforcement straddles both, which is the status quo and the source of the ambiguity.
Do not default to any of these. The whole readiness verdict turns on this being decided by a human owner, not inferred.

## Assumptions — acceptable only with an owner and an alarm clock
- Providers remain external, templates remain internal, at-least-once remains the delivery guarantee, and replay stays manual initially. Each is a working assumption; if you rely on one, name its owner and the condition that would invalidate it. Do not silently harden an assumption into a decision.

## Requested next action
If ownership is still open, the verdict is Blocked and the next owner is a discovery interview to run the focused trace: trace two preference changes through every delivery path. If ownership is decided, the verdict is Ready and the next owner is planning. Report the verdict, the next owner, and any hidden blocker — do not manufacture an ownership answer to unblock yourself.
