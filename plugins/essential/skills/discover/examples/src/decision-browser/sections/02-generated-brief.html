      <section
        id="generated-brief"
        class="discovery-section"
        data-discovery-section
        data-section-id="generated-brief"
        data-section-label="Generated reply"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">One live brief</p>
          <h2>Your reply to the coder</h2>
        </div>
        <div class="discovery-section-body">
          <p class="discovery-muted">
            This is the only generated prompt on the page. It changes whenever
            you answer a question or annotate a section.
          </p>
          <div
            class="discovery-prompt-card backdrop-blur-2xl ring-1 ring-[var(--ui-border)]"
          >
            <div class="discovery-prompt-toolbar">
              <span>Generated from this page</span>
              <button
                class="discovery-button"
                type="button"
                data-copy-generated-prompt
              >
                Copy prompt for LLM coder
              </button>
            </div>
            <textarea
              id="decision-browser-generated-prompt"
              name="generated-prompt"
              data-discovery-prompt-host
              readonly
              aria-label="Generated prompt for LLM coder"
            >
JavaScript will replace this fallback with the current decisions and annotations.
            </textarea>
          </div>
          <p
            class="discovery-copy-status"
            data-copy-status
            aria-live="polite"
          ></p>
          <button
            class="discovery-button discovery-button-secondary"
            type="button"
            data-clear-discovery-state
          >
            Clear answers and notes
          </button>
        </div>
      </section>
