# Feedback for the LLM coder

## Goal
Implement the schema migration using the expand–migrate–switch–contract pattern this board explains: change the track while the train keeps moving. Compatibility is what creates room to move — never break the running system to make progress.

## The invariant — do not violate at any stage
At every stage, readers and writers that have not yet moved must keep working. There is no window in which the old shape stops being valid before the new shape is proven. Backwards compatibility holds until the final contract step.

## The four stages, in order
- Expand the schema — add the new representation alongside the old; add, never replace.
- Write both shapes — dual-write so old and new stay in sync while consumers migrate.
- Migrate readers — move consumers to the new shape one at a time, backfilling historical rows.
- Switch, then contract — flip the source of truth once every reader is on the new shape, then (and only then) remove the old shape.

## Decision to make — rollout mode
Choose how aggressively to advance through the stages:
- Measured stages — advance one stage at a time, with a verification gate between each.
- Coordinated cutover — compress the switch into a planned window.
- Shadow first — run the new shape in shadow against sampled reads before any switch.
Rehearse rollback before the switch regardless of mode; a stage you cannot revert is not ready to advance. Do not pick coordinated cutover to save time if rollback has not been rehearsed.

## Open questions — do not silently resolve
- Whether the datastore can sustain dual reads/writes during peak traffic is an assumption to validate, not a given (see the section note). Backfill depth and sampled error rates on the board are illustrative shapes for teaching the pattern, not measured capacity.

## Requested next action
Build to the selected rollout mode and the four stages in order, holding the compatibility invariant at every step. Keep rollback rehearsable and the peak-traffic question open until measured. Report which stage you reached and what must be true before the switch.
