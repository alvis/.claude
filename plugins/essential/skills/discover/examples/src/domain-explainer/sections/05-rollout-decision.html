      <section
        id="rollout-decision"
        class="discovery-section"
        data-discovery-section
        data-section-id="rollout-decision"
        data-section-label="Rollout decision"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">Your decision</p>
          <h2>How much evidence before the read switch?</h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="rollout-cadence"
            data-question-label="Read-switch rollout cadence"
          >
            <legend>
              Choose the rollout cadence that matches this system's tolerance
              for risk.
            </legend>
            <div class="discovery-options">
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="rollout-cadence"
                  value="Measured stages with automatic rollback thresholds"
                  data-recommended="true"
                  checked
                />
                <span class="discovery-option-copy">
                  <strong>Measured stages</strong>
                  <small
                    >Move a small traffic cohort, compare behavior, then widen
                    only while thresholds hold.</small
                  >
                </span>
                <span class="discovery-badge">Recommended</span>
              </label>
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="rollout-cadence"
                  value="One coordinated read cutover after offline verification"
                />
                <span class="discovery-option-copy">
                  <strong>Coordinated cutover</strong>
                  <small
                    >Switch all reads together after verification; operationally
                    simpler, with a larger failure radius.</small
                  >
                </span>
              </label>
              <label class="discovery-option group">
                <input
                  type="radio"
                  name="rollout-cadence"
                  value="Shadow reads before any user-facing cutover"
                />
                <span class="discovery-option-copy">
                  <strong>Shadow first</strong>
                  <small
                    >Compare old and new reads in production without returning
                    the new result to users.</small
                  >
                </span>
              </label>
            </div>
          </fieldset>

          <div
            class="discovery-field"
            data-discovery-question
            data-question-id="rollout-constraint"
            data-question-label="Important rollout constraint"
          >
            <label for="rollout-constraint"
              >What constraint should change this recommendation?</label
            >
            <textarea
              id="rollout-constraint"
              placeholder="For example: the database cannot sustain dual reads during peak traffic."
            ></textarea>
          </div>
        </div>
      </section>
