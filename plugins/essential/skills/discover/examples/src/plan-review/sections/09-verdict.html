      <section
        id="verdict"
        class="discovery-section"
        data-discovery-section
        data-section-id="verdict"
        data-section-label="Hand-off verdict"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">The gate</p>
          <h2>One call: is this plan ready to build?</h2>
        </div>
        <div class="discovery-section-body">
          <p class="discovery-lede">
            This is the only verdict on the page. Your step answers and notes
            ride along in the generated reply either way — this decides whether I
            start building against them or take another pass first.
          </p>

          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="plan-verdict"
            data-question-label="Plan hand-off verdict"
            data-plan-verdict
          >
            <legend>How should I take this plan forward?</legend>
            <div class="discovery-options">
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="plan-verdict"
                  value="Hand off as-is — build to the recommended calls"
                /><span class="discovery-option-copy"
                  ><strong>Hand off as-is</strong
                  ><small
                    >The recommendations are right. Build to them as written.</small
                  ></span
                ></label
              >
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="plan-verdict"
                  value="Hand off with the tweaks marked above"
                  data-recommended="true"
                  checked
                /><span class="discovery-option-copy"
                  ><strong>Hand off with my tweaks</strong
                  ><small
                    >Build to the plan, with the step answers and notes I changed
                    on this page taking precedence over the recommendations.</small
                  ></span
                ><span class="discovery-badge">Expected</span></label
              >
              <label class="discovery-option"
                ><input
                  type="radio"
                  name="plan-verdict"
                  value="Needs another pass before building"
                /><span class="discovery-option-copy"
                  ><strong>Needs another pass</strong
                  ><small
                    >Something is off. Don't build yet — revise the plan against
                    my notes and bring it back.</small
                  ></span
                ></label
              >
            </div>
          </fieldset>
        </div>
      </section>
