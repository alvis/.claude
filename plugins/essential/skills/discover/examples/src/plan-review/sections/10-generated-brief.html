# Feedback for the LLM coder

## Goal
Build the "merge duplicate feedback threads" feature for Millpond to the plan on this board. The plan was reviewed as an interview: each step posed one judgment call, ordered by how likely I was to change it. This reply pins my answers so you build to my intent, not to the defaults.

## Plan step decisions (most likely to change → settled)
- Step 1 · Merge representation (schema): recommended redirect tombstone — add `merged_into_id` + `merged_at` to `feedback_threads`, add a `merged` state; reads redirect through one column. Alternative on the table is a `feedback_thread_merges` ledger. Unresolved until I touch it — do not assume.
- Step 2 · Votes & followers: recommended dedupe voters by customer and auto-union followers onto the survivor. Alternatives: raw-sum the counters, or dedupe without auto-subscribing B's followers. This is a product call — wait for my answer.
- Step 3 · Who can merge: recommended any triager (reuse the existing `edit?` policy) since merges are reversible; alternatives are admins-only or propose-then-confirm. All options keep a 30-day reversal.
- Step 4 · Merge UX surface: recommended an inline "Mark as duplicate of…" action with search; alternative is a dedicated side-by-side merge modal. Either way, confirm shows a combined-vote preview.
- Step 5 · API & notification (settled): `POST /feedback_threads/:id/merge { target_id }`, 409 on already-merged; recommended one merge notice to the survivor's followers, or stay silent.

## Hand-off verdict
Expected: hand off with my tweaks — where I changed a step answer or left a note, that outranks the recommendation. If I selected "needs another pass," do not build; revise the plan against my notes and bring it back.

## How to read this reply
An untouched step is a suggestion I have not confirmed, not a decision. Any counts on the board (vote overlaps, effort estimates) are illustrative shapes, not measured values — do not size anything from them. Build the confirmed calls first: the schema representation in step 1 gates everything downstream.
