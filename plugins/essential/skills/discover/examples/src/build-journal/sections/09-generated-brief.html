# Feedback for the LLM coder

## Goal
Close out the geofence-breach-alerts build. Every deviation from the plan is already resolved the conservative way; my answers below say which conservative defaults I accept as shipped and which I want reopened before this merges. Treat the deviations, not the plan, as the source of truth now — the plan is stale where they contradict it.

## Deviations and my disposition (plan said → code revealed → choice taken → my revisit)
- D1 · Circle geofences — the plan assumed polygons only; ~8% of geofences are circles that a polygon-only test would silently skip. Choice: branch on shape (haversine for circles, ray-casting for polygons). Confirm my accept/reopen on whether to collapse to one code path via polygon normalization.

- D3 · Device clock drift — device `recorded_at` drifts (hours off, some year-2038) and inverts enter/exit ordering. Choice: order by server `received_at`, quarantine pings >24h off instead of dropping them. Confirm whether the 24h bound holds or should be tuned against real offline-buffer upload windows.
- D4 · Alert-storm cap — `sendAlert()` fans out to billable SMS with no ceiling, so a jittering vehicle is a storm. Choice: per-fleet hourly cap with an "N more suppressed" digest. Confirm per-fleet grain vs. per-vehicle-per-geofence.

- Quarantined-ping disclosure — whether to surface "N pings held for review" to fleet managers (Marcus O. · Data Platform). Currently silent.

## Verdict
My selected verdict says whether this proceeds to review as-is, pauses until every reopened revisit is settled in code, or pauses only on the two hand-offs. Honor the verdict over any individual "accept" above if they conflict.

Apply exactly the revisits I reopened; leave the accepted defaults as shipped. Do not silently re-decide a hand-off. Any percentages, clock-drift figures, and text-volume counts on the board are illustrative shapes, not measured rates. Report back what changed and what still waits on the hand-offs.
