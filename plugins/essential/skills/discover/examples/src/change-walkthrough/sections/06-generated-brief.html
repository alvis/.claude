# Feedback for the LLM coder

## Goal
I have walked the alert-dedup and flap-suppression change (feat/alert-dedup → main) and understand it well enough to give a verdict. This reply records that verdict, what I verified, and what still needs to change before deploy. The subtle behavior is which alerts collapse into one incident and when a page is deliberately withheld — treat those two decisions, not the new table, as the review.

## What I confirmed I understand
- Dedup keys on source + check_id only. A check that flaps warning↔critical stays one incident, and the incident's shown severity is overwritten to the latest alert — so it can appear to downgrade (dedupe.go:34).
- The cooldown withholds pages, not updates. Inside the five-minute window a same-or-lower-severity re-fire updates the incident silently; only a strictly higher severity than the last paged level bypasses the cooldown (notifier.go:58,61).
- Dedup is scoped to open incidents by the partial unique index (WHERE state = 'open'), so a re-fire after resolution opens a fresh incident on purpose (0087_incident_fingerprint.sql:12).

## Changes to make before deploy
- Surface peak severity, not just current, on the incident view, so an incident that flapped down does not read as lower-risk than it was.
- Add a pre-migration check (or a fold step) for colliding open incidents before CREATE UNIQUE INDEX, so the backfill cannot fail mid-migration.
- Decide explicitly whether re-escalation to a previously-paged level should page again; the current bypass compares against NotifiedSeverity and will suppress it.

## Requested next action
Build to the verdict selected on the board and every saved annotation. Keep dedup behind alerting.dedup.enabled and confirm the escape hatch restores per-fire paging. The line and commit counts on the board are illustrative shapes, not a measured diff — do not treat them as real. Report what changed and how the escalation-suppression decision was resolved.
