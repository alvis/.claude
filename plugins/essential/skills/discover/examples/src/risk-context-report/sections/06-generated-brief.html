# Feedback for the LLM coder

## Goal
Implement the AI case-summary feature to the risk position pinned on this board. The model is only the final hop; the dangerous failure is a confident summary that no longer has the right to exist — built from evidence the viewer is no longer authorized to see. Treat the trust boundary, not the model, as the thing you are building.

## Risks to build against (evidence · consequence · probe)
- AUTH-07 · Close the authorization race — revocation and derived-cache invalidation are separate paths, so a summary can render from evidence whose access was just revoked. Build authorization-version binding: prove the evidence is still authorized at render time, not only at generation time.
- TRACE-03 · Make results reconstructable — the audit event (`summary_generated`) records case ID and model but not the evidence snapshot, so a disputed summary cannot be reconstructed. Build reconstructable lineage: capture the exact evidence set the summary was derived from.
- EVAL-12 · Guard overstatement — citations can be present while the claim overstates the source. Accuracy is not proven by the existence of a citation.
- OPS-04 · Exercise the fallback — the safe fallback has never run under partial failure. Build and drill it before exposure.
- HYP-02 · Shadow the review queue — human review may become the hidden throughput limit; shadow review capacity before it becomes a customer-visible bottleneck. (hypothesis)

## Prevent / Detect / Contain
Every risk maps to one of three: prevent (authorization binding), detect (lineage + accuracy checks), contain (fallback drill, review shadow). Small gaps in any layer combine into customer-visible failure — do not ship one layer and defer the others silently.

## Blocking decision — proof required before first exposure
Choose the exposure gate:
- Block on containment and lineage — nothing ships until AUTH-07 and TRACE-03 pass.
- Internal shadow first — run internally against sampled cases before any customer sees output.
- Restricted cohort with review — a small cohort behind mandatory human review.
A launch blocker needs a named owner, a measurable pass signal, and a deadline. Do not downgrade a blocker to a nice-to-have to unblock exposure.

## Requested next action
Build to the selected exposure gate and every saved annotation, closing the authorization race and making results reconstructable first. Keep the hypotheses (review capacity) as things to measure, not assume. Any replay counts or sampled-signal figures on the board are illustrative shapes, not measured rates. Report what containment is proven and what still blocks the first cohort.
