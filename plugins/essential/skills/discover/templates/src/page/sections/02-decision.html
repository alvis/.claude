      <section
        id="decision"
        class="discovery-section"
        data-discovery-section
        data-section-id="decision"
        data-section-label="Your input"
      >
        <div class="discovery-section-heading discovery-sticky">
          <p class="discovery-eyebrow">Your input</p>
          <h2>{{QUESTION_HEADING}}</h2>
        </div>
        <div class="discovery-section-body">
          <fieldset
            class="discovery-question"
            data-discovery-question
            data-question-id="{{QUESTION_ID}}"
            data-question-label="{{QUESTION_LABEL}}"
          >
            <legend>{{QUESTION_TEXT}}</legend>
            <div class="discovery-options">
              <label class="discovery-option group backdrop-blur-lg">
                <input
                  type="radio"
                  name="{{QUESTION_ID}}"
                  value="{{RECOMMENDED_VALUE}}"
                  data-recommended="true"
                  checked
                />
                <span class="discovery-option-copy">
                  <strong>{{RECOMMENDED_LABEL}}</strong>
                  <small>{{RECOMMENDED_DESCRIPTION}}</small>
                </span>
                <span class="discovery-badge">Recommended</span>
              </label>
              <label class="discovery-option group backdrop-blur-lg">
                <input
                  type="radio"
                  name="{{QUESTION_ID}}"
                  value="{{ALTERNATE_VALUE}}"
                />
                <span class="discovery-option-copy">
                  <strong>{{ALTERNATE_LABEL}}</strong>
                  <small>{{ALTERNATE_DESCRIPTION}}</small>
                </span>
              </label>
            </div>
          </fieldset>
        </div>
      </section>

      <!--
        RESPONSE-CAPTURE + DECISION-FIRST CONVENTION SLOTS (guided, not
        required — these devices generalize to EVERY action, not to any one
        board shape; see references/features.md for the floor rule and
        references/presentation/components.md "Decision-first devices" for
        the full recipes). All of them feed the single generated prompt;
        none adds a second prompt host.

        1. Option set with reasons — when real alternatives exist, the choice
           IS the decision: never offer a bare Accept. The live fieldset above
           is the shape; add one label per real alternative, each <small>
           carrying the reason, and exactly one data-recommended="true"
           checked with the Recommended badge.

        2. Accept/override brief pair — when there is one recommendation and
           no real alternative, capture assent compactly:
           <fieldset class="discovery-question" data-discovery-question
                     data-question-id="…" data-question-label="…">
             <legend>Accept the recommendation?</legend>
             <div class="discovery-options">
               <label class="discovery-option discovery-option-brief">
                 <input type="radio" name="…" value="Accept as recommended"
                        data-recommended="true" checked />
                 <span class="discovery-option-copy"
                   ><strong>Accept as recommended</strong></span>
                 <span class="discovery-badge">Recommended</span>
               </label>
               <label class="discovery-option discovery-option-brief">
                 <input type="radio" name="…" value="Override with note" />
                 <span class="discovery-option-copy"
                   ><strong>Override — my note explains</strong></span>
               </label>
             </div>
           </fieldset>

        3. Per-card capture — a question fieldset may live INSIDE a finding
           card so the response sits beside its evidence instead of in a
           distant form section:
           <article class="discovery-finding-card"
                    style="box-shadow: inset 3px 0 0 var(--ui-verdict-probe)">
             <h3>Card title <span class="discovery-badge">More discovery</span></h3>
             <p><strong>Gating</strong> — what blocks, and why.</p>
             <p class="discovery-muted"><strong>Evidence</strong> — with
               provenance; flag anything that needs a live query.</p>
             …option set (1) or accept/override pair (2) here…
           </article>
           The inset edge and badge colors come from the semantic ramps ONLY:
           --ui-verdict-{go|partial|probe|stop|done}, --ui-status-* and
           --ui-k-* (each with -soft/-ink). Map domain states onto the ramps
           per board in the head's data-board-theme overlay — never raw hex.

        4. Sequence strip — one chain of tiles showing what unblocks what,
           with semantic edges on the gating and terminal tiles:
           <div class="discovery-flow-strip" aria-label="…">
             <span style="box-shadow: inset 0 -2px 0 var(--ui-verdict-probe)"
               >Open decisions</span><span>Next milestone</span
             ><span style="box-shadow: inset 0 -2px 0 var(--ui-verdict-stop)"
               >Blocked outcome</span>
           </div>

        5. Board sign-off — a closing data-discovery-question fieldset in its
           own section that captures ONE whole-board verdict (e.g. proceed /
           more discovery first / pause), landing in the same single prompt
           beside every per-card answer.

        Reference captures: examples/reference/readiness-verdict-board.html
        and examples/reference/decision-browser.html compose these devices on
        two real boards; the shapes apply to any discovery job.
      -->
