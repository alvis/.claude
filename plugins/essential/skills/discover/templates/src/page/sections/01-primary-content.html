        OPTIONAL CONVENTION SLOTS (guided, not required — add only what the
        discovery job needs; see references/presentation/components.md).
        Each convention keeps house `--ui-*` theming and the single-prompt
        contract; none of them adds a second prompt host.

        1. Provenance pills — tag how a claim is known, wired from the ledger
           `Kind`/`Disposition`. Inline beside a claim, or on a table row:
           <span class="discovery-provenance" data-provenance="observed">observed</span>
           <tr data-provenance="inferred"> … </tr>
           Values: observed | inferred | assumed | decided | approved | open.

        2. "Trade-offs, honestly" — an honest self-critique block; mark any
           fabricated illustrative data so the coder does not treat it as real:
           <aside class="discovery-tradeoffs" data-tradeoffs-honestly>
             <h3>Trade-offs, honestly</h3>
             <div data-tradeoff-group="wins">…</div>
             <div data-tradeoff-group="costs">…</div>
             <div data-tradeoff-group="fails-when">…</div>
           </aside>
           <span class="discovery-invented-tag" data-invented-tag>invented</span>
           on a `data-fabricated` element.

        3. Author annotation pins over a browser-frame specimen (distinct from
           the reader's Add-note mechanism — never reuse data-annotation-for/
           -summary/-trigger/-dialog/-input). The pin layer is a SIBLING of
           [data-specimen] so brand colour never tints the teaching pins:
           <div class="discovery-artifact-frame" data-browser-frame> …
             <div data-specimen> …mockup in the product's own palette… </div>
             <div class="discovery-pin-layer" data-annotation-pins>
               <button class="discovery-pin" data-annotation-pin="1"
                       style="--pin-x:50%;--pin-y:11%"
                       aria-describedby="pin-note-1">1</button>
             </div>
           </div>
           paired to <li class="discovery-pin-note" data-pin-note="1" id="pin-note-1">.

        4. Multi-board hub — give each board a stable `data-board-id`; a hub
           board links siblings by session-relative href inside the session

               <li><a class="discovery-board-link" data-board-link="specimen-board"
                      href="./specimen-board.html">…</a></li>
             </ul>
           </section>
