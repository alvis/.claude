# Evaluation definition for discover.

eval_type: objective

test_cases:
  - name: blindspot_pass_preserves_provenance
    prompt: "I know nothing about this repository's authentication modules. Do a blindspot pass before we plan a new provider."
    expectations:
      - text: "selects blindspots mode and captures the user's starting knowledge"
        type: content
      - text: "labels user intent, observed evidence, inferences, unknowns, and accepted assumptions separately"
        type: content
      - text: "treats possible unknown unknowns as hypotheses until repository evidence supports them"
        type: content
      - text: "reports material unknowns with dispositions and one recommended next owner"
        type: content

  - name: prototype_is_disposable
    prompt: "Before wiring anything up, prototype three toolbar layouts with fake data so I can react to them."
    expectations:
      - text: "selects prototype mode and confirms artifact authorization"
        type: content
      - text: "creates only below .discovery-<slug>/prototypes with a DISPOSABLE marker and fake or sanitized data"
        type: content
      - text: "does not edit application source or wire production state or backend routes"
        type: content
      - text: "records the user's reaction as confirmed criteria or hypotheses with provenance"
        type: content

  - name: readiness_routes_to_decide
    prompt: "Check whether this discovery brief is ready to move forward; we have three viable approaches but have not chosen one."
    expectations:
      - text: "returns ready, more-discovery, or blocked after classifying every unresolved item"
        type: content
      - text: "routes a ready set of viable options to essential:decide rather than choosing within discover"
        type: content

trigger_eval:
  should_trigger:
    - "do a blindspot pass before we plan this feature"
    - "help me find my unknown unknowns in this codebase"
    - "brainstorm approaches from cheapest to most ambitious"
    - "interview me about anything that could change the architecture"
    - "extract the semantics from this reference implementation"
    - "make a disposable prototype before touching the real app"
    - "is this discovery work ready for a decision?"

  should_not_trigger:
    - "choose between these two already-researched database approaches" # essential:decide
    - "implement this approved PLAN.md"                                  # specification:implement-code
    - "fix this reproduced failing test"                                 # coding:fix
    - "research current OAuth provider pricing"                           # essential:deep-research
    - "optimize this prompt against my numeric evaluator"                 # essential:autoresearch
    - "redesign this dashboard and implement it"                          # web:design
    - "review the code I just changed"                                    # coding:review-code
