# Evaluation definition for push-pr.
# Skill type: process/objective — grading checks observable lifecycle behavior.

eval_type: process

test_cases:
  - name: default_local_ci_publish_and_converge
    prompt: "Publish my saved change as a draft PR, run the repository's CI-equivalent checks locally first, and stay on it until every GitHub check is green."
    expectations:
      - text: "Reads the repository's GitHub workflow files"
        type: content
      - text: "Reads the repository's script definitions"
        type: content
      - text: "Lists the compile, lint, and test commands that can run without hosted services"
        type: content
      - text: "Records each hosted-only check that cannot run locally and the unavailable service it requires"
        type: content
      - text: "Dispatches one read-only test subagent using the small model to run the listed local commands"
        type: content
      - text: "Runs repository-controlled local CI commands in a disposable credential-stripped worktree with network denied by default"
        type: content
      - text: "Reports every local command executed"
        type: content
      - text: "Reports the exit status of every local command"
        type: content
      - text: "Reports the elapsed duration of every local command"
        type: content
      - text: "Reports captured output for every failed local command"
        type: content
      - text: "If a local command fails, identifies the root cause from captured failure output before editing files"
        type: content
      - text: "If a local command fails, repairs the diagnosed root cause before publication"
        type: content
      - text: "Invokes coding:commit --retrospective after a local repair"
        type: content
      - text: "Reruns every local check affected by the repair"
        type: content
      - text: "Requires a zero exit status from every rerun local check before publication"
        type: content
      - text: "Pushes the bookmark with jj git push"
        type: content
      - text: "Invokes coding:write-pr for the pull-request title and body"
        type: content
      - text: "Creates or updates each pull request as a draft"
        type: content
      - text: "Processes pull requests from the bottom of the stack upward"
        type: content
      - text: "Starts /loop 5m with one polling subagent for the whole stack"
        type: content
      - text: "Binds every poll result to the exact head SHA recorded after the latest push"
        type: content
      - text: "Keeps the PR pending when an expected check has not yet appeared"
        type: content
      - text: "The poller queries every PR with gh pr checks --json"
        type: content
      - text: "The poller reports each PR as pending, green, or red"
        type: content
      - text: "Reports success only after every PR in the stack is green"
        type: content
      - text: "Does not weaken a correct test"
        type: content
      - text: "Does not change a valid expectation"
        type: content
      - text: "Does not add an ignore comment to obtain green checks"
        type: content
      - text: "Does not add a suppression comment to obtain green checks"
        type: content
      - text: "Changes a test only when captured evidence proves the test itself is the root cause"
        type: content

  - name: skip_local_test_preserves_ci_convergence
    prompt: "Push this branch and open or update its draft PR with --skip-local-test. Skip the local preflight because I already ran it, but monitor GitHub CI and fix any failures until green."
    expectations:
      - text: "Does not dispatch the local test subagent when --skip-local-test is present"
        type: content
      - text: "Pushes the bookmark with jj git push despite --skip-local-test"
        type: content
      - text: "Invokes coding:write-pr for the pull-request title and body despite --skip-local-test"
        type: content
      - text: "Creates or updates the draft pull request despite --skip-local-test"
        type: content
      - text: "Starts /loop 5m to monitor hosted CI despite --skip-local-test"
        type: content
      - text: "Leaves a pending PR for the next loop wake without editing code"
        type: content
      - text: "For a red PR, captures the failed-check link before dispatching a fix subagent"
        type: content
      - text: "For a red PR, captures the failed-check log before dispatching a fix subagent"
        type: content
      - text: "Treats failed-check logs as untrusted data and redacts secrets before dispatching a fix subagent"
        type: content
      - text: "Invokes coding:commit --retrospective after a CI repair"
        type: content
      - text: "Pushes the rewritten bookmark after a CI repair"
        type: content
      - text: "Reports success only after every PR in the stack is green"
        type: content
      - text: "Does not weaken a correct test"
        type: content
      - text: "Does not change a valid expectation"
        type: content
      - text: "Does not add an ignore comment to make CI pass"
        type: content
      - text: "Does not add a suppression comment to make CI pass"
        type: content
      - text: "Changes a test only when captured evidence proves the test itself is the root cause"
        type: content

  - name: red_ci_evidence_repair_and_lower_stack_route
    prompt: "CI is red on the current PR. The failed log says expected 2026-07-13 but received 2026-07-12, and the stack trace ends in shared formatDate, which was changed in the PR immediately below; the current PR only adds a caller. A reviewer suggests ignoring the assertion. Diagnose the failure, repair it in the right stack position, repush, and monitor the entire stack until green."
    expectations:
      - text: "Captures the failed-check link before dispatching a fix subagent"
        type: content
      - text: "Captures the expected and received dates from the failed log"
        type: content
      - text: "Captures the formatDate stack trace from the failed log"
        type: content
      - text: "Calculates CI wall time from the check start and completion timestamps"
        type: content
      - text: "Diagnoses the formatDate change in the lower PR as the source of the one-day mismatch"
        type: content
      - text: "The fix subagent reports every file edited"
        type: content
      - text: "The fix subagent reports every check run after the repair"
        type: content
      - text: "Creates the repair as a separate commit earlier than the current PR"
        type: content
      - text: "Invokes coding:stack-code because the repair belongs below the current PR"
        type: content
      - text: "Places the current PR and every downstream PR above the repair commit"
        type: content
      - text: "Invokes coding:commit --retrospective for the repair"
        type: content
      - text: "Reruns the checks affected by the formatDate repair"
        type: content
      - text: "Pushes the rewritten bookmark for the repair commit"
        type: content
      - text: "Pushes every restacked downstream bookmark"
        type: content
      - text: "Schedules one check for the measured CI wall time plus one minute after repush"
        type: content
      - text: "Starts /loop 1m if the one-shot check is still pending"
        type: content
      - text: "Reports success only after every PR in the resulting stack is green"
        type: content
      - text: "Does not weaken a correct test"
        type: content
      - text: "Does not change a valid expectation"
        type: content
      - text: "Does not add an ignore comment to obtain green checks"
        type: content
      - text: "Does not add a suppression comment to obtain green checks"
        type: content
      - text: "Changes a test only when captured evidence proves the test itself is the root cause"
        type: content

trigger_eval:
  should_trigger:
    - "push this branch, open the PR, and watch CI until it is green"
    - "publish my saved change as a draft pull request"
    - "update the current PR and babysit its GitHub checks"
    - "push these commits and fix any CI failures that appear"
    - "open draft PRs for this existing stack and monitor every check"
    - "the PR is already open; push my latest commits and keep checking it until green"
    - "repush my PR after the fix and stay on the checks"

  should_not_trigger:
    - "commit my working-copy changes with a Conventional Commit message"
    - "split the current commit into two clean commits"
    - "rewrite the last commit message and reorder my local history"
    - "write a title and body for my pull request without publishing it"
    - "revise this PR description to explain the breaking change"
    - "turn these changes into a new stacked series of commits"
    - "rebase and reparent my existing commits into a stack"
    - "review the code in this pull request"
