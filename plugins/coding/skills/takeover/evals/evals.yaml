# Evaluation definition for takeover freshness behavior.

eval_type: objective

test_cases:
  - name: trusted_within_24_hours
    prompt: "Resume this handover. CONTEXT.md Last Updated, NOTES.md Last Updated, and PLAN.md Updated all contain the same timestamp from 10 hours ago."
    expectations:
      - text: "always validates bundle structure and internal consistency"
        type: content
      - text: "returns freshness verdict trusted_24h and performs no repository assumption revalidation"
        type: content
      - text: "treats every recorded assumption as valid unless resumed work naturally finds contradictory evidence"
        type: content
      - text: "resolves recorded pending decisions before invoking coding:write-code --resume exactly once"
        type: content

  - name: revalidate_after_24_hours
    prompt: "Take over this implementation handover; its shared timestamp is 25 hours old."
    expectations:
      - text: "returns freshness verdict revalidated"
        type: content
      - text: "revalidates only drift-sensitive assumptions including branch or baseline, dependencies and APIs, configuration and schema, external references, and explicit recheck triggers"
        type: content
      - text: "records contradictions before resuming implementation"
        type: content

  - name: force_refresh
    prompt: "Resume this handover with --refresh even though it was updated one hour ago."
    expectations:
      - text: "returns freshness verdict forced_refresh and revalidates drift-sensitive assumptions despite the bundle age"
        type: content

trigger_eval:
  should_trigger:
    - "take over this paused implementation from CONTEXT.md NOTES.md and PLAN.md"
    - "resume this handover bundle"
    - "continue yesterday's coding work with takeover"
    - "takeover --refresh"

  should_not_trigger:
    - "create handover documents for this work"          # coding:handover
    - "start implementing this new feature"              # coding:write-code
    - "decide between these architecture options"        # essential:decide
    - "review the code from this pull request"            # coding:review-code
