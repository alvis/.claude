# Evaluation definition for finalize-commits
#
# eval_type: process — finalize-commits orchestrates a multi-step, dual-VCS
# per-commit QA + message-conformance workflow; grading targets process
# adherence (enumerate → scan → squash → loop → cleanup → push) rather than a
# single deterministic output.

test_cases:
  - name: jj_happy_path
    prompt: "Finalize my unpushed commits before I push."
    expectations:
      - text: "Probes the VCS, enumerates un-pushed described commits below @ oldest-first, and stops cleanly if there are none to finalize"
        type: content
      - text: "Runs install + lint + test/coverage against each commit in isolation and folds QA-induced edits back into the originating commit without a visible patch seam"
        type: content
      - text: "Writes a patch-id-validated QA marker per green commit so unchanged commits skip on re-run"
        type: content

  - name: forward_dependency_halt
    prompt: "QA each of my unpushed commits before push — one commit uses a helper that a later commit adds."
    expectations:
      - text: "Runs the forward-dependency scan first and HALTS before any QA when a commit references a symbol defined only in a later commit"
        type: content
      - text: "Presents the consumer commit, symbol, and defining commit with a reorder/squash remedy and asks whether to auto-apply or let the user handle it"
        type: content

  - name: failing_test_and_meaning_reword
    prompt: "Make sure every unpushed commit is green and the messages are clean, then push if they all pass."
    expectations:
      - text: "On a test/coverage failure raises a pending_decision and asks the user before continuing, resuming the per-commit loop after resolution"
        type: content
      - text: "Applies mechanical message fixes silently but surfaces a meaning-changing reword (e.g. feat to fix) for confirmation, and pushes only because --auto-push intent was expressed and the whole stack is green"
        type: content

trigger_eval:
  should_trigger:
    - "finalize my commits"
    - "QA the unpushed commits before I push"
    - "check each of my commits passes tests before pushing"
    - "run the test suite against every commit in my stack"
    - "make sure each commit is green before I open the PR"
    - "verify my unpushed commits one by one"
    - "finalize and push my stack if everything passes"

  should_not_trigger:
    - "commit my changes"
    - "split this commit into two"
    - "write a PR description for this branch"
    - "fix the failing test in src/parser.ts"
    - "reorder my commits"
    - "what does finalize-commits do?"
    - "squash all my commits into one and force push"
